name: generate animation

on:
  # Ejecutar automáticamente cada 24 horas
  schedule:
    - cron: "0 0 * * *" 
  
  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:
  
  # Ejecutar cada vez que haya un push al branch main
  push:
    branches:
      - main

jobs:
  generate:
    permissions: 
      contents: write # para que el bot pueda subir cambios
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Generar la serpiente
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: valeria-gm
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
      
      # Subir los archivos generados a la rama "output"
      - name: push github-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
